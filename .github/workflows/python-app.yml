# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches:
      - main
      - Development
  pull_request:
    branches:
      - main
      - Development

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v3
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest invoke coverage
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Set up Firefox
        id: setup-firefox
        uses: browser-actions/setup-firefox@v1

      - name: Set up Geckodriver
        uses: browser-actions/setup-geckodriver@latest

      - name: Verify Firefox and Geckodriver
        run: |
          echo "Firefox path: ${{ steps.setup-firefox.outputs.firefox-path }}"
          ${{ steps.setup-firefox.outputs.firefox-path }} --version
          geckodriver --version

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run non-UI tests
        run: invoke test

      - name: Run UI tests with Firefox
        run: |
          sudo ln -sf "${{ steps.setup-firefox.outputs.firefox-path }}" /usr/local/bin/firefox
          invoke geckodriver

      - name: Run UI tests with Chrome
        run: invoke chromedriver